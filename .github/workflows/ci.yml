# Fast PR checks — no API keys, no Census download, no Docker Compose.
name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Sync dependencies
        run: uv sync --extra dev

      - name: Ruff
        run: uv run ruff check src tests

      - name: Pytest
        run: uv run pytest -q

  smoke-scripts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Bash syntax (scripts/*.sh)
        run: |
          set -euo pipefail
          for f in scripts/*.sh; do
            bash -n "$f"
          done

      - name: Install uv (smoke_no_compose branch uses pytest optionally — skip heavy tests)
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Sync dependencies
        run: uv sync --extra dev

      - name: Smoke without Compose
        env:
          SMOKE_NO_COMPOSE: "1"
        run: bash scripts/smoke_test.sh

  dashboard-json:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate Grafana dashboard JSON
        run: python3 -m json.tool docker/grafana/dashboards/smoke-risk.json >/dev/null

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Sync dependencies (docs extra)
        run: uv sync --extra dev --extra docs

      - name: MkDocs strict build
        run: make docs-check
